<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Lumina Dental</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar scrolled">
        <div class="logo">
            <i class="fa-solid fa-tooth"></i>
            <span>Lumina Dental</span>
        </div>
        <div class="nav-links">
            <a href="index.html" class="btn-secondary"><i class="fa-solid fa-arrow-left"></i> Back to Site</a>
        </div>
    </nav>

    <div class="admin-container">
        <div class="admin-header">
            <div>
                <h2>Appointments Dashboard</h2>
                <p>Manage your pending patient appointments.</p>
            </div>
            <div class="stat-card">
                <span class="stat-label">Total Requests</span>
                <span class="stat-value" id="totalAppointments">0</span>
            </div>
        </div>

        <div class="appointments-grid" id="appointmentsList">
            <!-- Appointments will be injected here by app.js -->
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
